<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nusrath Secondary School - KG Result 2026</title>
  <style>
    body {
      height: 100vh;
      background: linear-gradient(160deg, #a8d8f0 0%, #c9e8f8 40%, #e0f4ff 70%, #b8d4f0 100%);
      background-repeat: no-repeat;
      background-attachment: fixed;
      background-size: cover;
      text-align: center;
      font-family: Arial, sans-serif;
      padding: 20px;
      overflow: hidden;
      margin: 0;
      position: relative;
    }

    /* ===== CLOUDS ===== */
    .clouds {
      position: absolute;
      top: 10px;
      left: 0;
      width: 100%;
      height: 100px;
      overflow: hidden;
      z-index: 0;
    }

    .cloud {
      width: 100px;
      height: 60px;
      background: white;
      border-radius: 50px;
      position: absolute;
      animation: moveClouds 30s linear infinite;
      opacity: 0.8;
    }

    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50px;
    }

    .cloud::before { width: 80px; height: 80px; top: -30px; left: 20px; }
    .cloud::after  { width: 50px; height: 50px; top: -20px; left: -30px; }

    .cloud:nth-child(1) { left: -100px; top: 10px; animation-duration: 25s; }
    .cloud:nth-child(2) { left: -200px; top: 50px; animation-duration: 35s; }
    .cloud:nth-child(3) { left: -300px; top: 30px; animation-duration: 40s; }

    @keyframes moveClouds {
      from { transform: translateX(-100px); }
      to   { transform: translateX(100vw); }
    }

    .cloud-over-text {
      position: absolute;
      width: 200px;
      height: 100px;
      background: rgba(255,255,255,0.7);
      border-radius: 50px;
      top: 80px;
      left: -220px;
      animation: moveCloudLeftToRight 10s linear infinite, floatUpDown 3s ease-in-out infinite alternate;
      z-index: 2;
    }

    .cloud-over-text::before, .cloud-over-text::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50px;
    }

    .cloud-over-text::before { width: 120px; height: 120px; top: -40px; left: 25px; }
    .cloud-over-text::after  { width: 70px;  height: 70px;  top: -30px; left: -50px; }

    @keyframes moveCloudLeftToRight {
      from { left: -220px; }
      to   { left: 100vw; }
    }

    @keyframes floatUpDown {
      from { transform: translateY(0); }
      to   { transform: translateY(-10px); }
    }

    /* ===== RAINBOW ===== */
    .rainbow-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .rainbow-arc {
      position: absolute;
      border-radius: 50%;
      border-style: solid;
      border-color: transparent;
      animation: rainbowFade 6s ease-in-out infinite;
    }

    .r1 { width:700px; height:700px; top:60px;  left:50%; transform:translateX(-50%); border-top-color:#ff0000; border-width:16px; animation-delay:0s;   }
    .r2 { width:662px; height:662px; top:78px;  left:50%; transform:translateX(-50%); border-top-color:#ff7700; border-width:16px; animation-delay:0.2s; }
    .r3 { width:624px; height:624px; top:96px;  left:50%; transform:translateX(-50%); border-top-color:#ffee00; border-width:16px; animation-delay:0.4s; }
    .r4 { width:586px; height:586px; top:114px; left:50%; transform:translateX(-50%); border-top-color:#00cc44; border-width:16px; animation-delay:0.6s; }
    .r5 { width:548px; height:548px; top:132px; left:50%; transform:translateX(-50%); border-top-color:#2299ff; border-width:16px; animation-delay:0.8s; }
    .r6 { width:510px; height:510px; top:150px; left:50%; transform:translateX(-50%); border-top-color:#6633cc; border-width:16px; animation-delay:1s;   }
    .r7 { width:472px; height:472px; top:168px; left:50%; transform:translateX(-50%); border-top-color:#cc44aa; border-width:16px; animation-delay:1.2s; }

    @keyframes rainbowFade {
      0%, 100% { opacity: 0.25; }
      50%       { opacity: 0.9; }
    }

    /* ===== TEXT & FORM ===== */
    h3 {
      font-size: 32px;
      color: #4a1a8c;
      font-weight: bold;
      text-shadow: 2px 2px #ffe066;
      font-family: Arial, sans-serif;
      position: relative;
      z-index: 1;
      margin: 6px 0;
    }

    .form-wrapper {
      position: relative;
      z-index: 3;
      display: inline-block;
      margin-top: 10px;
    }

    form {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
      display: inline-block;
    }

    select, input[type="text"] {
      padding: 10px;
      width: 90%;
      border: 2px solid #ff9800;
      border-radius: 8px;
      margin: 10px;
      font-size: 18px;
      background: #fff8e1;
      color: #d84315;
      font-weight: bold;
      transition: transform 0.3s ease-in-out, box-shadow 0.3s;
      text-align: center;
    }

    select:hover, input[type="text"]:hover {
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(255,87,34,0.5);
    }

    .submit-btn {
      background: #ffeb3b;
      color: #d84315;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      padding: 10px;
      width: 92%;
      border: 2px solid #ff9800;
      border-radius: 8px;
      margin: 10px;
    }

    .submit-btn:hover {
      background: #ff5722;
      color: white;
      transform: scale(1.1);
    }

    .error-msg {
      display: none;
      background: #fde8e8;
      color: #D32F2F;
      border: 2px solid #D32F2F;
      border-radius: 8px;
      padding: 10px 16px;
      margin: 8px 10px 0;
      font-weight: bold;
      font-size: 15px;
    }

    .loading-msg {
      display: none;
      color: #4a1a8c;
      font-weight: bold;
      font-size: 16px;
      margin-top: 10px;
      position: relative;
      z-index: 3;
    }
  </style>
</head>
<body>

  <div class="rainbow-container">
    <div class="rainbow-arc r1"></div>
    <div class="rainbow-arc r2"></div>
    <div class="rainbow-arc r3"></div>
    <div class="rainbow-arc r4"></div>
    <div class="rainbow-arc r5"></div>
    <div class="rainbow-arc r6"></div>
    <div class="rainbow-arc r7"></div>
  </div>

  <div class="clouds">
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
  </div>

  <div class="cloud-over-text"></div>

  <h3>Nusrath Secondary School Randathani</h3>
  <h3>Annual Evaluation Result 2026</h3>

  <div class="form-wrapper">
    <form onsubmit="fetchResult(event)">
      <select id="clSelect" required>
        <option value="">Select Class:</option>
        <option value="LKGA">LKG A ✏️</option>
        <option value="LKGB">LKG B 📖</option>
        <option value="UKGA">UKG A 🎒</option>
        <option value="UKGB">UKG B 🏫</option>
      </select>
      <br><br>
      <input type="text" id="rlInput" placeholder="Enter Admission Number" required />
      <br><br>
      <button type="submit" class="submit-btn">Get Result</button>
      <div class="error-msg" id="errorMsg">❌ Invalid Admission Number. Please check and try again.</div>
    </form>
  </div>

  <div class="loading-msg" id="loadingMsg">⏳ Fetching result, please wait...</div>

  <script>
    // ============================================================
    // ⚠️  CONFIGURATION — UPDATE THESE TWO VALUES
    // ============================================================
    const SPREADSHEET_ID = '1I9bHsymIQQ-xcyWYo0ebVIS2gkpQpcrFTCUCLNo3e3A';
    const API_KEY        = 'AIzaSyCW-vklD56ELiPpXYM8lD1ec1-PNDhwtRU';  // <-- Replace with your API key
    // ============================================================

    async function fetchResult(e) {
      e.preventDefault();
      const cls  = document.getElementById('clSelect').value;
      const roll = document.getElementById('rlInput').value.trim();
      const errEl  = document.getElementById('errorMsg');
      const loadEl = document.getElementById('loadingMsg');

      errEl.style.display  = 'none';
      loadEl.style.display = 'block';

      try {
        const url  = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(cls)}?key=${API_KEY}`;
        const res  = await fetch(url);
        if (!res.ok) throw new Error('Sheet not found or API error');
        const json = await res.json();
        const rows = json.values || [];

        let found = null;
        for (const row of rows) {
          if ((row[0] || '').toString().trim() === roll) {
            found = row;
            break;
          }
        }

        loadEl.style.display = 'none';

        if (!found) {
          errEl.style.display = 'block';
          return;
        }

        sessionStorage.setItem('kgResultData', JSON.stringify({ cls, roll, data: found }));
        window.location.href = 'KG_result.html';

      } catch (err) {
        loadEl.style.display = 'none';
        errEl.textContent    = '⚠️ Error: ' + err.message;
        errEl.style.display  = 'block';
      }
    }
  </script>

</body>
</html>
